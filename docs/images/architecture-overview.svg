<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F7FA"/>
      <stop offset="1" stop-color="#E9EFF5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#4B5563"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #0F172A; }
      .subtitle { font: 500 16px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #475569; }
      .box-title { font: 700 24px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #0F172A; }
      .box-body { font: 500 16px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #334155; }
      .mini { font: 600 14px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #475569; }
      .label { font: 600 15px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #1F2937; }
      .capsule { font: 700 13px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #0F172A; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="28" fill="url(#bg)"/>

  <text x="72" y="82" class="title">LOL Team Builder Architecture</text>
  <text x="72" y="114" class="subtitle">로컬 팀 생성 알고리즘이 중심이고, 클라우드는 Riot 데이터 저장과 운영 도구를 지원하는 보조 계층입니다.</text>

  <rect x="72" y="170" width="300" height="244" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="104" y="220" class="box-title">Main Desktop Client</text>
  <text x="104" y="258" class="box-body">• PyQt5 main application</text>
  <text x="104" y="288" class="box-body">• Dataset editing</text>
  <text x="104" y="318" class="box-body">• Team generation</text>
  <text x="104" y="348" class="box-body">• Recent match browsing</text>
  <rect x="104" y="366" width="192" height="30" rx="15" fill="#DBEAFE"/>
  <text x="120" y="386" class="capsule">core: client/domain/team_builder.py</text>

  <rect x="72" y="454" width="300" height="224" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="104" y="504" class="box-title">Riot Loader</text>
  <text x="104" y="542" class="box-body">• Admin-only local tool</text>
  <text x="104" y="572" class="box-body">• Manual / scheduled ingestion</text>
  <text x="104" y="602" class="box-body">• Firestore monitoring</text>
  <text x="104" y="632" class="box-body">• Cleanup / retention controls</text>

  <rect x="454" y="240" width="292" height="370" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="486" y="290" class="box-title">Cloud Run API</text>
  <text x="486" y="328" class="box-body">• FastAPI service</text>
  <text x="486" y="358" class="box-body">• JWT auth / admin endpoints</text>
  <text x="486" y="388" class="box-body">• Match / account queries</text>
  <text x="486" y="418" class="box-body">• Firestore admin API</text>
  <text x="486" y="448" class="box-body">• /health endpoint</text>
  <rect x="486" y="484" width="206" height="30" rx="15" fill="#DCFCE7"/>
  <text x="502" y="504" class="capsule">deploy: Docker → Cloud Run</text>
  <rect x="486" y="528" width="214" height="30" rx="15" fill="#FEF3C7"/>
  <text x="502" y="548" class="capsule">runtime env: PORT / Firestore / JWT</text>

  <rect x="824" y="170" width="304" height="244" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="856" y="220" class="box-title">Cloud Firestore</text>
  <text x="856" y="258" class="box-body">• app_users</text>
  <text x="856" y="288" class="box-body">• riot_accounts</text>
  <text x="856" y="318" class="box-body">• matches</text>
  <text x="856" y="348" class="box-body">• match_participants</text>
  <rect x="856" y="366" width="184" height="30" rx="15" fill="#E0E7FF"/>
  <text x="872" y="386" class="capsule">persistent storage layer</text>

  <rect x="824" y="454" width="304" height="224" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="856" y="504" class="box-title">Riot API</text>
  <text x="856" y="542" class="box-body">• Match history fetch</text>
  <text x="856" y="572" class="box-body">• Summoner / rank metadata</text>
  <text x="856" y="602" class="box-body">• Used mainly by local admin flow</text>
  <rect x="856" y="624" width="204" height="30" rx="15" fill="#FCE7F3"/>
  <text x="872" y="644" class="capsule">API key managed locally</text>

  <path d="M372 292H454" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M372 566H454" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M746 340H824" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M824 374H746" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M978 454V430C978 406 958 388 934 388H746" stroke="#7C3AED" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <text x="838" y="430" class="label">ingestion flow</text>

  <path d="M980 170V146C980 122 960 104 936 104H268C244 104 224 122 224 146V170" stroke="#0EA5E9" stroke-width="4" stroke-dasharray="10 10"/>
  <text x="466" y="152" class="mini">desktop-first product</text>

  <rect x="454" y="646" width="674" height="54" rx="18" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="482" y="680" class="label">권장 운영: 메인 앱은 저장된 Firestore 데이터를 읽고, Riot 적재와 정리는 로컬 관리자 도구에서 수행</text>
</svg>
