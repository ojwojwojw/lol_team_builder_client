<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCFCFD"/>
      <stop offset="1" stop-color="#EEF2F7"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #0F172A; }
      .subtitle { font: 500 16px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #475569; }
      .box-title { font: 700 22px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #0F172A; }
      .box-body { font: 500 15px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #334155; }
      .label { font: 700 15px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #1F2937; }
      .capsule { font: 700 13px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #0F172A; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="28" fill="url(#bg2)"/>

  <text x="72" y="82" class="title">Desktop App Screens and User Flow</text>
  <text x="72" y="114" class="subtitle">사용자는 로그인 후 계정을 검색하고, 최근 경기 정보를 확인한 뒤 로컬 팀 생성 알고리즘으로 결과를 만든다.</text>

  <rect x="70" y="180" width="250" height="220" rx="24" fill="#FFFFFF" filter="url(#shadow2)"/>
  <text x="98" y="224" class="box-title">1. Login Dialog</text>
  <text x="98" y="258" class="box-body">• Server URL</text>
  <text x="98" y="286" class="box-body">• Username / Password</text>
  <text x="98" y="314" class="box-body">• Clear saved session</text>
  <rect x="98" y="344" width="142" height="28" rx="14" fill="#DBEAFE"/>
  <text x="114" y="363" class="capsule">session entry point</text>

  <rect x="370" y="150" width="360" height="470" rx="24" fill="#FFFFFF" filter="url(#shadow2)"/>
  <text x="402" y="194" class="box-title">2. Main Client Workspace</text>
  <text x="402" y="230" class="box-body">• Dataset list and local player table</text>
  <text x="402" y="258" class="box-body">• Add / edit / remove players</text>
  <text x="402" y="286" class="box-body">• Search stored Riot accounts</text>
  <text x="402" y="314" class="box-body">• Load all stored users</text>
  <text x="402" y="342" class="box-body">• Add selected account into dataset</text>

  <rect x="402" y="374" width="296" height="90" rx="16" fill="#EFF6FF"/>
  <text x="420" y="402" class="label">Recent Match Panel</text>
  <text x="420" y="428" class="box-body">Match list, KDA, win rate, position stats, champion stats</text>

  <rect x="402" y="486" width="296" height="90" rx="16" fill="#F0FDF4"/>
  <text x="420" y="514" class="label">Team Builder Result</text>
  <text x="420" y="540" class="box-body">Balanced teams, role fit, recent form, copyable output</text>

  <rect x="780" y="180" width="350" height="220" rx="24" fill="#FFFFFF" filter="url(#shadow2)"/>
  <text x="812" y="224" class="box-title">3. Account Search and Match View</text>
  <text x="812" y="258" class="box-body">• Search account by game name</text>
  <text x="812" y="286" class="box-body">• Select one stored user</text>
  <text x="812" y="314" class="box-body">• Browse recent matches</text>
  <text x="812" y="342" class="box-body">• Open match detail dialog</text>
  <rect x="812" y="350" width="174" height="28" rx="14" fill="#FCE7F3"/>
  <text x="828" y="369" class="capsule">data-assisted analysis</text>

  <rect x="780" y="460" width="350" height="170" rx="24" fill="#FFFFFF" filter="url(#shadow2)"/>
  <text x="812" y="504" class="box-title">4. Local Team Generation</text>
  <text x="812" y="538" class="box-body">• Uses local domain logic</text>
  <text x="812" y="566" class="box-body">• Does not depend on live Riot API calls</text>
  <text x="812" y="594" class="box-body">• Produces shareable team output</text>

  <path d="M320 290H370" stroke="#475569" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M730 290H780" stroke="#475569" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M955 400V460" stroke="#475569" stroke-width="4" marker-end="url(#arrow2)"/>

  <rect x="70" y="650" width="1060" height="54" rx="18" fill="#FFFFFF" filter="url(#shadow2)"/>
  <text x="98" y="684" class="label">핵심 포인트: 사용자가 직접 쓰는 제품은 PyQt5 데스크톱 앱이며, 서버는 계정/최근 경기 데이터를 제공하는 보조 계층이다.</text>
</svg>
